# Ollama config
QUARKUS_LANGCHAIN4J_OLLAMA_BASE_URL=${OLLAMA_BASE_URL:http://ollama:11434}
QUARKUS_LANGCHAIN4J_OLLAMA_CHAT_MODEL_MODEL_ID=${OLLAMA_MODEL_ID:llama2}
QUARKUS_LANGCHAIN4J_OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:30s}
QUARKUS_LANGCHAIN4J_OLLAMA_MAX_RETRIES=${OLLAMA_MAX_RETRIES:3}

# Database config (if needed, but ORM is disabled by default)
QUARKUS_DATASOURCE_JDBC_URL=${DB_JDBC_URL:jdbc:postgresql://db:5432/chatbot}
QUARKUS_DATASOURCE_USERNAME=${DB_USERNAME:chatbot}
QUARKUS_DATASOURCE_PASSWORD=${DB_PASSWORD:chatbot}

# Disable Hibernate ORM (optional, can be overridden)
QUARKUS_HIBERNATE_ORM_ENABLED=${HIBERNATE_ORM_ENABLED:false}
